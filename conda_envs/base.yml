name: projekt-base

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip

  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu132
      - numpy
      - scipy
      - matplotlib
      - tqdm
      - scikit-image
      - pillow
      - seaborn
      - pycocotools
      - scikit-learn
      - albumentations
      - opencv-contrib-python
      - opencv-python
      - torch==2.12.0+cu132
      - torchvision==0.27.0+cu132
      - ultralytics
      - timm
      